<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Create Account | RocketEarn X</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { dark: '#05030a' },
                    fontFamily: { sans: ['Outfit', 'sans-serif'], space: ['Space Grotesk', 'sans-serif'] },
                    backgroundImage: {
                        'futuristic-gradient': 'radial-gradient(circle at top left, rgba(0,240,255,0.15), transparent 40%), radial-gradient(circle at bottom right, rgba(138,43,226,0.1), transparent 40%)',
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #05030a; color: #ffffff; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
        .glass-card { background: linear-gradient(160deg, rgba(30, 20, 50, 0.6), rgba(10, 5, 20, 0.9)); backdrop-filter: blur(16px); border: 1px solid rgba(0, 240, 255, 0.3); box-shadow: 0 0 40px rgba(0, 240, 255, 0.15); }
        .input-glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s ease; }
        .input-glass:focus { background: rgba(255, 255, 255, 0.05); border-color: #00f0ff; box-shadow: 0 0 15px rgba(0, 240, 255, 0.3); outline: none; }
        .glow-gold { box-shadow: 0 0 20px rgba(255, 215, 0, 0.4); }
        @keyframes pulse-neon { 0%, 100% { box-shadow: 0 0 15px rgba(0, 240, 255, 0.4); } 50% { box-shadow: 0 0 35px rgba(0, 240, 255, 0.8); } }
        .pulse-neon { animation: pulse-neon 2s infinite; }
        .btn-loading { opacity: 0.7; pointer-events: none; }
    </style>
</head>
<body class="bg-futuristic-gradient min-h-screen flex items-center justify-center relative p-4 py-10">

    <!-- Particle Background -->
    <canvas id="particles" class="fixed top-0 left-0 w-full h-full pointer-events-none z-0"></canvas>

    <!-- Back to Home -->
    <a href="rocketearnx.html" class="absolute top-6 left-6 text-gray-400 hover:text-white flex items-center gap-2 z-10 transition-colors font-medium">
        <i class="fa-solid fa-arrow-left"></i> Home
    </a>

    <!-- Register Box -->
    <div class="glass-card w-full max-w-lg rounded-3xl p-8 sm:p-10 relative z-10 transform transition-all duration-500 opacity-0 scale-95" id="register-box">
        
        <div class="text-center mb-8">
            <div class="w-16 h-16 mx-auto rounded-full bg-cyan-500/20 flex items-center justify-center border border-cyan-500/50 text-cyan-400 text-3xl mb-4 pulse-neon"><i class="fa-solid fa-user-astronaut"></i></div>
            <h2 class="font-space text-3xl font-bold text-white mb-2">Create Account</h2>
            <p class="text-gray-400 text-sm">Join 50,000+ members and start earning today.</p>
        </div>

        <form onsubmit="handleRegister(event)" class="space-y-4">
            
            <!-- Full Name & Phone Row -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-medium text-gray-300 mb-1 ml-1">Full Name</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-gray-400"><i class="fa-solid fa-user"></i></div>
                        <input type="text" required placeholder="John Doe" class="w-full input-glass rounded-xl py-3 pl-10 pr-4 text-white text-sm placeholder-gray-500">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-300 mb-1 ml-1">Mobile Number</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-gray-400"><i class="fa-solid fa-phone"></i></div>
                        <input type="tel" required placeholder="+91 XXXXX XXXXX" class="w-full input-glass rounded-xl py-3 pl-10 pr-4 text-white text-sm placeholder-gray-500">
                    </div>
                </div>
            </div>

            <!-- Email Input -->
            <div>
                <label class="block text-xs font-medium text-gray-300 mb-1 ml-1">Email Address</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-gray-400"><i class="fa-solid fa-envelope"></i></div>
                    <input type="email" required placeholder="name@example.com" class="w-full input-glass rounded-xl py-3 pl-10 pr-4 text-white text-sm placeholder-gray-500">
                </div>
            </div>

            <!-- Invite Code -->
            <div>
                <label class="block text-xs font-medium text-gray-300 mb-1 ml-1">Invite/Referral Code <span class="text-gray-500">(Optional)</span></label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-gray-400"><i class="fa-solid fa-gift"></i></div>
                    <input type="text" placeholder="Enter Invite Code" class="w-full input-glass rounded-xl py-3 pl-10 pr-4 text-white text-sm placeholder-gray-500 uppercase">
                </div>
            </div>

            <!-- Password Input -->
            <div>
                <label class="block text-xs font-medium text-gray-300 mb-1 ml-1">Create Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-gray-400"><i class="fa-solid fa-lock"></i></div>
                    <input type="password" id="reg-password" required placeholder="Min 8 characters" class="w-full input-glass rounded-xl py-3 pl-10 pr-10 text-white text-sm placeholder-gray-500">
                    <button type="button" onclick="togglePassword('reg-password', 'reg-eye')" class="absolute inset-y-0 right-0 pr-3.5 flex items-center text-gray-400 hover:text-white">
                        <i id="reg-eye" class="fa-solid fa-eye"></i>
                    </button>
                </div>
            </div>

            <!-- Terms Checkbox -->
            <div class="flex items-start mt-2">
                <div class="flex items-center h-5">
                    <input type="checkbox" id="terms" required class="w-4 h-4 rounded border-gray-600 text-cyan-500 focus:ring-cyan-500 bg-white/10 accent-cyan-500 cursor-pointer">
                </div>
                <label for="terms" class="ml-2 block text-xs text-gray-400 cursor-pointer">
                    I agree to the <a href="terms.html" class="text-cyan-400 hover:underline">Terms & Conditions</a> and <a href="privacy.html" class="text-cyan-400 hover:underline">Privacy Policy</a>.
                </label>
            </div>

            <!-- Submit Button -->
            <button type="submit" id="reg-btn" class="w-full bg-gradient-to-r from-blue-500 to-cyan-500 text-dark font-extrabold py-3.5 rounded-xl hover:scale-[1.02] transition-transform shadow-[0_0_20px_rgba(0,240,255,0.4)] flex justify-center items-center gap-2 mt-6">
                <span>Create Free Account</span> <i class="fa-solid fa-rocket"></i>
            </button>
        </form>

        <div class="mt-6 text-center border-t border-white/10 pt-5">
            <p class="text-gray-400 text-sm">Already have an account? <a href="login.html" class="text-gold-400 font-bold hover:underline">Login Here</a></p>
        </div>
    </div>

    <script>
        // Entry Animation
        setTimeout(() => {
            const box = document.getElementById('register-box');
            box.classList.remove('opacity-0', 'scale-95');
        }, 100);

        // Show/Hide Password
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        // Handle Registration Animation
        function handleRegister(e) {
            e.preventDefault();
            const btn = document.getElementById('reg-btn');
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Creating Account...`;
            btn.classList.add('btn-loading');

            // Simulate API Call delay
            setTimeout(() => {
                alert("Account Created Successfully! (Demo)");
                btn.innerHTML = `<span>Create Free Account</span> <i class="fa-solid fa-rocket"></i>`;
                btn.classList.remove('btn-loading');
                window.location.href = "login.html"; // Redirect to login page
            }, 2500);
        }

        // Particle Background
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let width, height, particlesArray = [];
        function initCanvas() {
            width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight;
            particlesArray = [];
            for(let i=0; i<30; i++) particlesArray.push({
                x: Math.random() * width, y: Math.random() * height, size: Math.random() * 2,
                speedX: Math.random() * 0.5 - 0.25, speedY: Math.random() * 0.5 - 0.25,
                color: Math.random() > 0.5 ? 'rgba(0,240,255,0.3)' : 'rgba(138,43,226,0.3)'
            });
        }
        function drawParticles() {
            ctx.clearRect(0, 0, width, height);
            particlesArray.forEach(p => {
                p.x += p.speedX; p.y += p.speedY;
                if(p.x < 0 || p.x > width) p.speedX *= -1; if(p.y < 0 || p.y > height) p.speedY *= -1;
                ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
            }); requestAnimationFrame(drawParticles);
        }
        window.addEventListener('resize', initCanvas); initCanvas(); drawParticles();
    </script>
</body>
</html>
