<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login | RocketEarn X</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { dark: '#05030a' },
                    fontFamily: { sans: ['Outfit', 'sans-serif'], space: ['Space Grotesk', 'sans-serif'] },
                    backgroundImage: {
                        'futuristic-gradient': 'radial-gradient(circle at top right, rgba(138,43,226,0.15), transparent 40%), radial-gradient(circle at bottom left, rgba(0,240,255,0.1), transparent 40%)',
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #05030a; color: #ffffff; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
        .glass-card { background: linear-gradient(160deg, rgba(30, 20, 50, 0.6), rgba(10, 5, 20, 0.9)); backdrop-filter: blur(16px); border: 1px solid rgba(138, 43, 226, 0.3); box-shadow: 0 0 40px rgba(138, 43, 226, 0.15); }
        .input-glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s ease; }
        .input-glass:focus { background: rgba(255, 255, 255, 0.05); border-color: #a855f7; box-shadow: 0 0 15px rgba(168, 85, 247, 0.3); outline: none; }
        .glow-gold { box-shadow: 0 0 20px rgba(255, 215, 0, 0.4); }
        @keyframes pulse-neon { 0%, 100% { box-shadow: 0 0 15px rgba(138, 43, 226, 0.4); } 50% { box-shadow: 0 0 35px rgba(138, 43, 226, 0.8); } }
        .btn-loading { opacity: 0.7; pointer-events: none; }
    </style>
</head>
<body class="bg-futuristic-gradient min-h-screen flex items-center justify-center relative p-4">

    <!-- Particle Background -->
    <canvas id="particles" class="fixed top-0 left-0 w-full h-full pointer-events-none z-0"></canvas>

    <!-- Back to Home -->
    <a href="rocketearnx.html" class="absolute top-6 left-6 text-gray-400 hover:text-white flex items-center gap-2 z-10 transition-colors font-medium">
        <i class="fa-solid fa-arrow-left"></i> Back to Home
    </a>

    <!-- Login Box -->
    <div class="glass-card w-full max-w-md rounded-3xl p-8 sm:p-10 relative z-10 transform transition-all duration-500 opacity-0 translate-y-10" id="login-box">
        
        <!-- Logo -->
        <div class="flex justify-center mb-6">
            <div class="w-16 h-16 rounded-full bg-purple-500/20 flex items-center justify-center border border-purple-500/50 glow-gold text-3xl pulse-neon">🚀</div>
        </div>

        <div class="text-center mb-8">
            <h2 class="font-space text-3xl font-bold text-white mb-2">Welcome Back</h2>
            <p class="text-gray-400 text-sm">Login to access your RocketEarn X dashboard.</p>
        </div>

        <form onsubmit="handleLogin(event)" class="space-y-5">
            <!-- Email Input -->
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1.5 ml-1">Email or Phone Number</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
                        <i class="fa-solid fa-user"></i>
                    </div>
                    <input type="text" required placeholder="Enter your email or phone" class="w-full input-glass rounded-xl py-3.5 pl-11 pr-4 text-white placeholder-gray-500">
                </div>
            </div>

            <!-- Password Input -->
            <div>
                <div class="flex justify-between items-center mb-1.5 ml-1 mr-1">
                    <label class="block text-sm font-medium text-gray-300">Password</label>
                    <a href="#" class="text-xs text-purple-400 hover:text-purple-300 font-medium">Forgot Password?</a>
                </div>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
                        <i class="fa-solid fa-lock"></i>
                    </div>
                    <input type="password" id="password" required placeholder="Enter your password" class="w-full input-glass rounded-xl py-3.5 pl-11 pr-12 text-white placeholder-gray-500">
                    <button type="button" onclick="togglePassword('password', 'eye-icon')" class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-white transition-colors">
                        <i id="eye-icon" class="fa-solid fa-eye"></i>
                    </button>
                </div>
            </div>

            <!-- Remember Me -->
            <div class="flex items-center">
                <input type="checkbox" id="remember" class="w-4 h-4 rounded border-gray-600 text-purple-600 focus:ring-purple-500 bg-white/10 accent-purple-500 cursor-pointer">
                <label for="remember" class="ml-2 block text-sm text-gray-400 cursor-pointer">Remember me for 30 days</label>
            </div>

            <!-- Submit Button -->
            <button type="submit" id="login-btn" class="w-full bg-gradient-to-r from-purple-600 to-blue-600 text-white font-bold py-4 rounded-xl hover:scale-[1.02] transition-transform shadow-[0_0_20px_rgba(138,43,226,0.4)] flex justify-center items-center gap-2 mt-4">
                <span>Login to Dashboard</span> <i class="fa-solid fa-arrow-right"></i>
            </button>
        </form>

        <div class="mt-8 text-center border-t border-white/10 pt-6">
            <p class="text-gray-400 text-sm">Don't have an account? <a href="register.html" class="text-gold-400 font-bold hover:underline">Register Now</a></p>
        </div>
    </div>

    <script>
        // Entry Animation
        setTimeout(() => {
            const box = document.getElementById('login-box');
            box.classList.remove('opacity-0', 'translate-y-10');
        }, 100);

        // Show/Hide Password
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        // Handle Login Submission Animation
        function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Authenticating...`;
            btn.classList.add('btn-loading');

            // Simulate API Call delay
            setTimeout(() => {
                alert("Login Successful! (Demo)");
                btn.innerHTML = `<span>Login to Dashboard</span> <i class="fa-solid fa-arrow-right"></i>`;
                btn.classList.remove('btn-loading');
                window.location.href = "rocketearnx.html"; // Redirect to home
            }, 2000);
        }

        // Particle Background
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let width, height, particlesArray = [];
        function initCanvas() {
            width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight;
            particlesArray = [];
            for(let i=0; i<30; i++) particlesArray.push({
                x: Math.random() * width, y: Math.random() * height, size: Math.random() * 2,
                speedX: Math.random() * 0.5 - 0.25, speedY: Math.random() * 0.5 - 0.25,
                color: Math.random() > 0.5 ? 'rgba(138,43,226,0.3)' : 'rgba(0,240,255,0.3)'
            });
        }
        function drawParticles() {
            ctx.clearRect(0, 0, width, height);
            particlesArray.forEach(p => {
                p.x += p.speedX; p.y += p.speedY;
                if(p.x < 0 || p.x > width) p.speedX *= -1; if(p.y < 0 || p.y > height) p.speedY *= -1;
                ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
            }); requestAnimationFrame(drawParticles);
        }
        window.addEventListener('resize', initCanvas); initCanvas(); drawParticles();
    </script>
</body>
</html>
